name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"  # 06:00 UTC every Monday — integration tests

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check src/ tests/ scripts/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install mypy docling docling-core pyyaml pydantic fastapi chromadb sentence-transformers
      - run: mypy src/ --ignore-missing-imports

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements-core.txt -r requirements-dev.txt
      - run: pip install .
      - run: pytest tests/ -v --tb=short -x -q --ignore=tests/test_integration.py -p no:xdist

  integration:
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements-core.txt -r requirements-optional.txt -r requirements-dev.txt
      - run: pip install .
      - run: pytest tests/test_integration.py -v --tb=short -m integration -q

  build:
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t docling-rag-pipeline .
      - run: docker images docling-rag-pipeline --format "{{.Size}}" | awk '{print "Image size: " $1/1024/1024 " MB"}'
