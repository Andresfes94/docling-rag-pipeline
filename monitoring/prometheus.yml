global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: rag-pipeline
    static_configs:
      - targets: ["rag-pipeline:8000"]
    metrics_path: /metrics
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: "(.*):.*"
        replacement: "$1"
